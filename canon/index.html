.entry .position, .entry .dialogue, .entry .note { font-family: var(--sans-cjk); font-size: 0.88rem;
  color: var(--ink-soft); margin: 0.55rem 0; line-height: 1.78; }
html[data-lang="en"] .entry .position, html[data-lang="en"] .entry .dialogue, html[data-lang="en"] .entry .note { font-family: var(--serif-body); font-size: 0.95rem; }
.entry .tag { font-family: var(--serif-display); font-style: italic; font-size: 0.92rem; color: var(--navy-600); margin-right: 0.45rem; }

  margin-bottom: 0.5rem; }

  background: var(--paper-shade); color: var(--ink-soft); border: 1px solid var(--rule); padding: 0.12rem 0.5rem;
  border-radius: 2px; margin: 0 0.3rem 0.3rem 0; }
.tension-link { grid-column: 1 / -1; display: flex; align-items: center; gap: 0.8rem; margin: 0.2rem 0;
  font-family: var(--serif-display); font-style: italic; font-size: 1rem; color: var(--navy-600); }
.tension-link::before, .tension-link::after { content:""; flex: 1; height: 1px; background: var(--navy-400); opacity: 0.4; }
#empty { display: none; font-family: var(--sans-cjk); font-size: 0.95rem; color: var(--ink-faint); padding: 3rem 0; text-align: center; }

  .theme-head { align-items: start; }

}

<script>
const THEMES = {
  "signal": {
    title: { zh:"物如何承载社会意义？", en:"How Do Objects Carry Social Meaning?" },
    gloss: { zh:"一件物品的价值有多少来自它本身、多少来自它在社会场域中替我们说的话？符号价值如何运作、向谁运作、又如何反噬？从 Veblen 的炫耀，到进化信号、心理补偿、符号政治经济学，直至反消费如何折回为新的信号。",
      en:"How much of an object's value resides in the thing itself, and how much in what it says on our behalf within a social field? How does symbolic value operate, for whom, and how does it turn back on itself — from Veblen's ostentation through evolutionary signaling, psychological compensation, and the political economy of the sign, to the way anti-consumption folds back into a signal of its own." }
  },
  "self": {
    title: { zh:"那个「我」，在多大程度上是它自己的作者？", en:"To What Extent Is the \u201CSelf\u201D Its Own Author?" },
    gloss: { zh:"进行筹划、被权力塑造、并在时间中追问自身连续性的「我」——它是自由的作者、被建构的产物，还是一个根本不存在的内核？存在主义肯定它，福柯／阿尔都塞消解它，帕菲特悬置它，叙事身份试图在裂缝间搭一座经验之桥。",
      en:"The \u201CI\u201D that projects itself, is shaped by power, and interrogates its own continuity through time — is it a free author, a constructed product, or a core that does not really exist? Existentialism affirms it, Foucault and Althusser dissolve it, Parfit suspends it, and narrative identity tries to build an empirical bridge across the fault lines." }
  },
  "orphans": {
    title: { zh:"待归类", en:"Unsorted" },
    gloss: { zh:"尚未找到能对话的同伴的好论文。先收进来，等它将来遇到能成主题的伙伴。",
      en:"Strong papers that have not yet found an interlocutor. Admitted provisionally, awaiting a partner to form a theme with." }
  }
};
const DATA = [
  {
    id: "berger-ward-2010", theme: "signal",
    domains: [ { zh:"消费行为学", en:"Consumer behavior" }, { zh:"社会学", en:"Sociology" }, { zh:"文化资本", en:"Cultural capital" } ],
    cite: { zh:`Berger, J., & Ward, M. (2010). <span class="title">Subtle Signals of Inconspicuous Consumption.</span> <span class="venue">Journal of Consumer Research, 37(4), 555–569.</span>`,
            en:`Berger, J., & Ward, M. (2010). <span class="title">Subtle Signals of Inconspicuous Consumption.</span> <span class="venue">Journal of Consumer Research, 37(4), 555–569.</span>` },
    claim: { zh:`价格与品牌信号显著度之间是<b>倒 U 曲线</b>：最高端与最低端都不打 logo，吵闹的中端才满身标记。内行偏好的不是「无信号」，而是「只有内行能解码的信号」——驱动力是<b>区隔</b>，而非道德上的反炫耀。`,
             en:`Brand-signal explicitness traces an <b>inverted-U</b> against price: both the cheapest and the priciest goods forgo logos, while the noisy middle tier is saturated with them. Insiders prefer not the <em>absence</em> of a signal but signals only insiders can decode — driven by <b>distinction</b>, not moral distaste for ostentation.` },
    position: { zh:`坐落于 Veblen《有闲阶级论》之后对炫耀性消费的<b>修正传统</b>中，与 Bourdieu 的「区隔」、Holt 论文化资本一脉相承。它把信号理论从「越响越好」推进到「信号保真度取决于受众的文化资本」，为日后「安静的奢侈」(quiet luxury) 一系研究提供了实证源头。`,
               en:`Sits within the <b>revisionist tradition</b> following Veblen's <em>Theory of the Leisure Class</em>, in the lineage of Bourdieu's <em>distinction</em> and Holt on cultural capital. It pushes signaling theory beyond "louder is better" to "signal fidelity depends on the audience's cultural capital," becoming an empirical fountainhead for the later "quiet luxury" literature.` },
    dialogue: { zh:`与 <a href="#nelissen-2011">Nelissen & Meijers (2011)</a> 构成本主题核心张力：那篇证明炫耀对<b>大众</b>有效，这篇证明炫耀对<b>内行</b>无效甚至扣分。二者不矛盾——观察者的文化资本水平决定哪套机制运行。`,
                en:`Forms this theme's central tension with <a href="#nelissen-2011">Nelissen & Meijers (2011)</a>: that paper shows ostentation works on the <b>mass</b> audience; this one shows it fails — even backfires — among <b>insiders</b>. No contradiction: the observer's cultural capital decides which mechanism runs.` },
    note: { zh:`局限：被试全为女性、刺激物几乎全是手袋／墨镜，外部效度有边界。以问卷测「偏好」而非真实行为——这一缺口恰由配对的 Nelissen 用真实金钱补强。`,
            en:`Limits: all-female samples, stimuli almost entirely handbags/sunglasses, bounding external validity. Measures stated <em>preference</em> rather than real behavior — a gap its paired entry closes with real money.` }
  },
  {
    id: "nelissen-2011", theme: "signal", pairWith: "berger-ward-2010",
    domains: [ { zh:"进化心理学", en:"Evolutionary psychology" }, { zh:"消费行为学", en:"Consumer behavior" }, { zh:"博弈实验", en:"Experimental economics" } ],
    cite: { zh:`Nelissen, R. M. A., & Meijers, M. H. C. (2011). <span class="title">Social Benefits of Luxury Brands as Costly Signals of Wealth and Status.</span> <span class="venue">Evolution and Human Behavior, 32(5), 343–355.</span>`,
            en:`Nelissen, R. M. A., & Meijers, M. H. C. (2011). <span class="title">Social Benefits of Luxury Brands as Costly Signals of Wealth and Status.</span> <span class="venue">Evolution and Human Behavior, 32(5), 343–355.</span>` },
    claim: { zh:`以代价高昂信号理论（孔雀尾巴）解释奢侈消费：七个实验（含四个真实田野）证明奢侈 logo 真实提升地位感知并带来实利——连募捐、独裁者博弈中都成立。但只有<b>昂贵且刻意</b>的信号管用：普通品牌、或「被要求穿上」的偶然展示，效应消失。`,
             en:`Reads luxury through costly-signaling theory (the peacock's tail): seven experiments (four real field studies) show luxury logos genuinely raise status perception and yield tangible benefits — even in charity solicitation and a dictator game. Yet only <b>costly and intentional</b> signals work: ordinary brands, or "asked-to-wear" incidental displays, dissolve the effect.` },
    position: { zh:`代表消费研究的<b>进化／代价信号</b>路径（Zahavi 累赘原理经 Miller、Saad 引入），以真实行为与因果中介补强 Veblen 命题。结论援引 Miller 的<b>「基本消费主义错觉」</b>——相信「有什么／显得如何」能弥补「是什么」——使一篇看似为奢侈正名的论文转为批判，恰可与叔本华《人生的智慧》三分法接通。`,
               en:`Exemplifies the <b>evolutionary / costly-signaling</b> route (Zahavi's handicap principle via Miller and Saad), buttressing Veblen with real behavior and causal mediation. Its conclusion invokes Miller's <b>"fundamental consumerist delusion"</b> — that the acquired can compensate for the innate — turning an apparent defense of luxury into a critique of it, dovetailing with Schopenhauer's tripartite scheme in <em>The Wisdom of Life</em>.` },
    dialogue: { zh:`与 <a href="#berger-ward-2010">Berger & Ward (2010)</a> 互补：方法论更硬（真实行为／真实金钱／因果机制），其边界条件（仅用「适度奢侈」、避开过于招摇）恰好留出 Berger 倒 U 高端区间来填补。`,
                en:`Complements <a href="#berger-ward-2010">Berger & Ward (2010)</a>: methodologically harder (real behavior, real money, causal mechanism); its boundary condition — only "modest luxury," avoiding the overly ostentatious — leaves precisely the high-end arm of Berger's inverted-U to fill the gap.` },
    note: { zh:`边界条件（作者自陈）：所用品牌在该文化中均有正面形象；过于炫耀可能产生相反效果。样本以荷兰为主，跨文化外推需谨慎。`,
            en:`Boundary conditions (authors' own): all brands carried a positive image in the studied culture; overly ostentatious display may reverse the effect. Predominantly Dutch samples — cross-cultural generalization warrants caution.` }
  },
  {
    id: "rucker-galinsky-2008", theme: "signal",
    domains: [ { zh:"消费心理学", en:"Consumer psychology" }, { zh:"权力与社会心理", en:"Power & social psychology" } ],
    cite: { zh:`Rucker, D. D., & Galinsky, A. D. (2008). <span class="title">Desire to Acquire: Powerlessness and Compensatory Consumption.</span> <span class="venue">Journal of Consumer Research, 35(2), 257–267.</span>`,
            en:`Rucker, D. D., & Galinsky, A. D. (2008). <span class="title">Desire to Acquire: Powerlessness and Compensatory Consumption.</span> <span class="venue">Journal of Consumer Research, 35(2), 257–267.</span>` },
    claim: { zh:`三个实验显示：<b>无力感</b>(powerlessness) 推高人对地位相关商品的支付意愿与谈判保留价——但仅限于地位相关的产品。炫耀消费在这里被重解为对内在权力缺口的<b>补偿</b>，而非对外的财富信号。`,
             en:`Three experiments: a state of <b>powerlessness</b> raises willingness to pay and reservation prices — but only for status-related products. Conspicuous consumption is reframed here as <b>compensation</b> for an internal deficit of power, not as an outward signal of wealth.` },
    position: { zh:`开创了消费研究中的<b>补偿性消费</b>(compensatory consumption) 路径，后被 Mandel 等 (2017) 整合为「自我差距驱动消费」的总模型。它把解释的重心从「信号传给谁」(Veblen/Berger/Nelissen 共享的外向视角) 转向「消费者内心缺了什么」——为本主题引入一条全新的<b>内向心理</b>轴线。`,
               en:`Inaugurates the <b>compensatory-consumption</b> route in consumer research, later synthesized by Mandel et al. (2017) into a general "self-discrepancy drives consumption" model. It shifts the explanatory weight from "to whom is the signal sent" (the outward view shared by Veblen/Berger/Nelissen) to "what is missing inside the consumer" — introducing a new <b>inward, psychological</b> axis to this theme.` },
    dialogue: { zh:`与 <a href="#berger-ward-2010">Berger</a>／<a href="#nelissen-2011">Nelissen</a> 形成<b>视角对位</b>：他们问信号对观察者如何，此文问消费者自身为何需要它。直接呼应你最初那个买包困境——「格调是一种极高的自尊」是否其实是某种缺口的补偿？其姊妹篇 Rucker & Galinsky (2009, JESP) 进一步证明高权力反而转向<b>功能性</b>消费，与无力者的炫耀偏好成镜像。`,
                en:`Stands in <b>perspectival counterpoint</b> to <a href="#berger-ward-2010">Berger</a> / <a href="#nelissen-2011">Nelissen</a>: they ask how the signal lands on observers; this asks why the consumer needs it at all. It speaks directly to the original backpack dilemma — is "taste as a form of high self-esteem" in fact compensation for some deficit? Its sibling paper, Rucker & Galinsky (2009, JESP), shows high power instead turns toward <b>utilitarian</b> consumption — a mirror image of the powerless preference for ostentation.` },
    note: { zh:`局限：以情境诱导的「无力感」为主，与稳定的社会地位低位不完全等同；外部效度上仍是实验室支付意愿，而非真实购买。`,
            en:`Limits: relies mainly on situationally induced powerlessness, not fully equivalent to stable low social rank; outcomes are lab willingness-to-pay rather than real purchases.` }
  },
  {
    id: "baudrillard-1972", theme: "signal",
    domains: [ { zh:"哲学", en:"Philosophy" }, { zh:"批判理论", en:"Critical theory" }, { zh:"符号学", en:"Semiotics" } ],
    cite: { zh:`Baudrillard, J. (1972/1981). <span class="title">For a Critique of the Political Economy of the Sign.</span> <span class="venue">（C. Levin 译）St. Louis: Telos Press.</span>`,
            en:`Baudrillard, J. (1972/1981). <span class="title">For a Critique of the Political Economy of the Sign.</span> <span class="venue">(Trans. C. Levin.) St. Louis: Telos Press.</span>` },
    claim: { zh:`提出<b>符号价值</b>(sign value) 与使用、交换、象征价值并列为第四种价值。消费的真正对象不是物，而是物所携带的<b>差异性意义</b>——「你消费的从来不是物，而是关系本身」。需求并非天然，而是被社会话语建构的。`,
             en:`Posits <b>sign value</b> as a fourth form of value alongside use, exchange, and symbolic value. The true object of consumption is not the thing but the <b>differential meaning</b> it carries — "you never consume the object, but the relation itself." Needs are not innate but constructed by social discourse.` },
    position: { zh:`在 Marx 之后、受 Barthes 符号学影响，把消费批判从生产领域推进到<b>符号领域</b>。它为本主题提供了<b>理论上层建筑</b>：前述实证研究测量的「地位信号」「区隔」「补偿」，在 Baudrillard 这里被统一为「经济交换价值向符号交换价值的转换」。是把零散实验抬升到社会理论高度的关键节点。`,
               en:`After Marx and under Barthes's semiotic influence, it moves the critique of consumption from the sphere of production to the <b>sphere of the sign</b>. It supplies this theme's <b>theoretical superstructure</b>: the "status signal," "distinction," and "compensation" measured by the empirical papers are unified here as "the conversion of economic exchange value into sign exchange value." A key node lifting scattered experiments to the level of social theory.` },
    dialogue: { zh:`为全主题提供<b>理论框架</b>：Berger/Nelissen/Rucker 是其命题的可操作化与实证检验。同时与之<b>张力</b>——Baudrillard 视符号系统为无可逃脱的牢笼（「连符号也必须燃烧」），而实证传统暗示个体仍有策略性选择空间。这一对立本身即是本主题最深的问题。`,
                en:`Provides the theme's <b>theoretical frame</b>: Berger/Nelissen/Rucker operationalize and test its propositions. Yet also in <b>tension</b> with them — Baudrillard sees the sign-system as an inescapable cage ("even signs must burn"), while the empirical tradition implies individuals retain strategic room to choose. That opposition is itself this theme's deepest question.` },
    note: { zh:`性质不同于实证研究：思辨性社会理论，无可证伪的实验，结论依赖论证而非数据。收入正典是作为<b>解释框架</b>而非证据，需与实证条目区别对待。`,
            en:`Different in kind from the empirical work: speculative social theory, no falsifiable experiment, conclusions resting on argument rather than data. Admitted as an <b>interpretive frame</b> rather than evidence, to be weighed differently from the empirical entries.` }
  },
  {
    id: "taylor-2025", theme: "signal", pairWith: "baudrillard-1972",
    domains: [ { zh:"消费行为学", en:"Consumer behavior" }, { zh:"营销学", en:"Marketing" } ],
    cite: { zh:`Taylor, D. G., et al. (2025). <span class="title">What, No Logos? Why Some Minimalists Prefer Quiet Luxury.</span> <span class="venue">Psychology & Marketing, 42(1).</span>`,
            en:`Taylor, D. G., et al. (2025). <span class="title">What, No Logos? Why Some Minimalists Prefer Quiet Luxury.</span> <span class="venue">Psychology & Marketing, 42(1).</span>` },
    claim: { zh:`区分四类极简主义者，其中<b>「不显眼的极简者」</b>(inconspicuous minimalist) 并不拒斥奢侈，反而追求高品质＋低调品牌。极简在此不是反消费，而是一种<b>更精微的奢侈消费方式</b>，偏好「安静」而非「喧闹」的品牌显著度。`,
             en:`Distinguishes four types of minimalists; the <b>"inconspicuous minimalist"</b> does not reject luxury but seeks high quality with quiet branding. Minimalism here is not anti-consumption but a <b>more refined mode of luxury consumption</b>, favoring "quiet" over "loud" brand prominence.` },
    position: { zh:`处在<b>反消费／自愿简朴</b>研究与<b>安静奢侈</b>研究的交汇处，直接延续 Berger & Ward 的「低调信号」并接入近年「炫耀性非消费」(conspicuous non-consumption, Sezer et al.) 一脉——后者论证<b>不消费本身可成为更高的地位信号</b>。`,
               en:`Sits at the crossroads of <b>anti-consumption / voluntary-simplicity</b> research and the <b>quiet-luxury</b> literature, extending Berger & Ward's "subtle signals" and connecting to the recent "conspicuous non-consumption" strand (Sezer et al.) — which argues that <b>not consuming can itself become a higher status signal</b>.` },
    dialogue: { zh:`为本主题画上<b>辩证回环</b>：若极简／反消费也能折回为信号，则 Baudrillard 的命题被推到极致——<b>逃离符号系统的尝试本身已被符号系统收编</b>。这恰是你买 Timbuk2 困境的最辛辣镜像：选择「不炫耀的工具」可能正是你所在场域里最高阶的炫耀。`,
                en:`Closes the theme's <b>dialectical loop</b>: if minimalism / anti-consumption also folds back into a signal, Baudrillard's thesis is pushed to its limit — <b>the very attempt to escape the sign-system is recaptured by it</b>. A sharp mirror of the Timbuk2 dilemma: choosing the "unostentatious tool" may be the highest ostentation available in one's field.` },
    note: { zh:`局限：较新文献，复现与跨样本稳健性尚待积累；「不显眼极简者」的类型划分依赖自陈动机，存在社会赞许性偏差风险。`,
            en:`Limits: a recent literature whose replication and cross-sample robustness are still accruing; the "inconspicuous minimalist" typology relies on self-reported motives, risking social-desirability bias.` }
  },
  {
    id: "sartre-1943", theme: "self",
    domains: [ { zh:"哲学", en:"Philosophy" }, { zh:"存在主义", en:"Existentialism" } ],
    cite: { zh:`Sartre, J.-P. (1943/1956). <span class="title">Being and Nothingness.</span> <span class="venue">（H. Barnes 译）New York: Philosophical Library.</span>`,
            en:`Sartre, J.-P. (1943/1956). <span class="title">Being and Nothingness.</span> <span class="venue">(Trans. H. Barnes.) New York: Philosophical Library.</span>` },
    claim: { zh:`「存在先于本质」：人没有被给定的本质，而是通过持续的<b>筹划</b>(le projet) 把自己投向未来的可能性——你即你之所为。自由是无可逃脱的重负；以「我本就如此」来推卸选择，即<b>自欺</b>(mauvaise foi)。`,
             en:`"Existence precedes essence": the human has no given essence but throws itself toward future possibility through continual <b>projection</b> (le projet) — you are what you do. Freedom is an inescapable burden; to disown one's choices by pleading "this is just how I am" is <b>bad faith</b> (mauvaise foi).` },
    position: { zh:`本主题最具<b>能动性</b>的一极，把自我完全交还给「我」。是存在主义自我观的奠基性文本，下接克尔凯郭尔「自我选择自我」、上启加缪的反抗主体。在本正典里它也是<b>方法论原点</b>——你买包那场对话中反复出现的「我变了吗」「自我是否须保持一致」，本质上就是 project 连续性问题。`,
               en:`The theme's most <b>agentic</b> pole, returning the self wholly to the "I." A founding text of the existentialist account of selfhood, descending from Kierkegaard's "the self chooses itself" and ascending toward Camus's rebelling subject. Within this canon it is also a <b>methodological origin</b>: the "have I changed?" and "must the self stay consistent?" that recurred in the backpack conversation are, at bottom, questions of the continuity of the project.` },
    dialogue: { zh:`被 <a href="#foucault-1975">福柯</a>／<a href="#althusser-1970">阿尔都塞</a> 直接拆台：那个自以为「自由筹划」的主体，在他们看来不过是规训与询唤的产物。又被 <a href="#parfit-1984">帕菲特</a> 从下方抽空地基——若并无持续同一的自我，则「筹划者」筹划的或许是个不存在之物。`,
                en:`Directly undercut by <a href="#foucault-1975">Foucault</a> / <a href="#althusser-1970">Althusser</a>: the subject that believes it "freely projects" is, in their view, a product of discipline and interpellation. And hollowed out from below by <a href="#parfit-1984">Parfit</a> — if there is no persisting identical self, the "projector" may be projecting something that does not exist.` },
    note: { zh:`性质：思辨性现象学／本体论，非实证研究。其「绝对自由」常被批评为低估了社会、阶级、身体对选择的结构性约束——这一批评恰由本主题第二极承担。`,
            en:`Kind: speculative phenomenology/ontology, not empirical research. Its "absolute freedom" is often criticized for underrating the structural constraints of society, class, and body on choice — a critique carried precisely by this theme's second pole.` }
  },
  {
    id: "foucault-1975", theme: "self", pairWith: "sartre-1943",
    domains: [ { zh:"哲学", en:"Philosophy" }, { zh:"批判理论", en:"Critical theory" }, { zh:"社会理论", en:"Social theory" } ],
    cite: { zh:`Foucault, M. (1975/1977). <span class="title">Discipline and Punish: The Birth of the Prison.</span> <span class="venue">（A. Sheridan 译）New York: Pantheon.</span>`,
            en:`Foucault, M. (1975/1977). <span class="title">Discipline and Punish: The Birth of the Prison.</span> <span class="venue">(Trans. A. Sheridan.) New York: Pantheon.</span>` },
    claim: { zh:`现代主体不是规训的<b>前提</b>，而是规训的<b>产物</b>。通过全景敞视(panopticon)式的监视、规范化、身体的微观训练，权力不靠压制而靠<b>生产</b>来运作——它生产出会自我监管的「个体」。所谓内在自我，是被外部权力技术塑造出来的效果。`,
             en:`The modern subject is not the <b>premise</b> of discipline but its <b>product</b>. Through panoptic surveillance, normalization, and the micro-training of bodies, power works not by repression but by <b>production</b> — it produces self-policing "individuals." The supposed inner self is an effect manufactured by external technologies of power.` },
    position: { zh:`本主题<b>去中心</b>一极的支柱，与第一极构成最尖锐的对立：萨特的自由筹划者，在福柯看来正是规训的成品。在本正典中它与 <a href="#baudrillard-1972">Baudrillard</a> 直接握手——符号系统与规训系统是消解自主主体的两副面孔，使「物如何承载意义」自然延伸为「承载意义的那个『我』又是怎么被造出来的」。`,
               en:`A pillar of the theme's <b>decentering</b> pole, in sharpest opposition to the first: Sartre's free projector is, for Foucault, precisely a finished product of discipline. Within this canon it shakes hands with <a href="#baudrillard-1972">Baudrillard</a> — the sign-system and the disciplinary system are two faces of the dissolution of the autonomous subject, extending "how objects carry meaning" into "how the 'I' that carries meaning was itself made."` },
    dialogue: { zh:`与 <a href="#sartre-1943">萨特</a> 正面冲突（能动 vs 被造）。常被反驳的一点：若主体彻底是权力的产物，<b>抵抗</b>从何而来？福柯晚期「自我的技术」(technologies of the self) 部分回应了此问，也为与第一极的调和留了缝隙。`,
                en:`In head-on conflict with <a href="#sartre-1943">Sartre</a> (agency vs. fabrication). A common rejoinder: if the subject is wholly a product of power, whence <b>resistance</b>? Foucault's later "technologies of the self" partly answers this and leaves a seam for reconciliation with the first pole.` },
    note: { zh:`性质：历史哲学／社会理论，论证依赖历史档案与谱系学方法，而非可证伪实验。其主体观的强版本（主体完全被建构）在经验上难以直接检验。`,
            en:`Kind: historico-philosophical social theory, resting on archival and genealogical method rather than falsifiable experiment. The strong version of its thesis (the subject is wholly constructed) is hard to test empirically and directly.` }
  },
  {
    id: "althusser-1970", theme: "self",
    domains: [ { zh:"哲学", en:"Philosophy" }, { zh:"批判理论", en:"Critical theory" }, { zh:"马克思主义", en:"Marxism" } ],
    cite: { zh:`Althusser, L. (1970/1971). <span class="title">Ideology and Ideological State Apparatuses.</span> <span class="venue">见 Lenin and Philosophy（B. Brewster 译）London: NLB.</span>`,
            en:`Althusser, L. (1970/1971). <span class="title">Ideology and Ideological State Apparatuses.</span> <span class="venue">In Lenin and Philosophy (Trans. B. Brewster). London: NLB.</span>` },
    claim: { zh:`意识形态通过<b>询唤</b>(interpellation) 把个体「招募」为主体——如警察在街上一声「嘿，说你呢！」，你一回头，便已被构成为那个被呼唤的主体。主体性不是起点，而是意识形态运作的<b>结果与条件</b>。`,
             en:`Ideology "recruits" individuals as subjects through <b>interpellation</b> — like a policeman's "Hey, you there!" on the street: the moment you turn around, you are already constituted as the hailed subject. Subjectivity is not a starting point but the <b>result and condition</b> of ideology's operation.` },
    position: { zh:`与福柯同属去中心一极，但路径不同：福柯走身体／规训，阿尔都塞走意识形态／结构。二者合力使第一极的「自由」显得可疑。在思想史上它是结构主义马克思主义对人本主义主体观的关键一击，影响了此后整个文化研究与后结构主义。`,
               en:`Shares the decentering pole with Foucault but by a different route: Foucault via body/discipline, Althusser via ideology/structure. Together they render the first pole's "freedom" suspect. Historically a key structuralist-Marxist blow against the humanist conception of the subject, shaping cultural studies and post-structuralism thereafter.` },
    dialogue: { zh:`强化 <a href="#foucault-1975">福柯</a> 对 <a href="#sartre-1943">萨特</a> 的拆台，但留下经典难题：若人始终已是被询唤的主体，批判意识与革命主体如何可能？这一「结构 vs 能动」(structure vs agency) 之争，正是本主题悬而未决的中心。`,
                en:`Reinforces <a href="#foucault-1975">Foucault</a>'s undercutting of <a href="#sartre-1943">Sartre</a>, yet leaves the classic puzzle: if one is always-already an interpellated subject, how is critical consciousness — or a revolutionary subject — possible? This "structure vs. agency" dispute is the theme's unresolved center.` },
    note: { zh:`性质：理论文本，无实证检验，且「总是已经」(always-already) 的循环结构使其在逻辑上近乎不可证伪——这既是其力量也是其弱点。`,
            en:`Kind: theoretical text, untested empirically; its "always-already" circularity makes it nearly unfalsifiable in logic — both its strength and its weakness.` }
  },
  {
    id: "parfit-1984", theme: "self",
    domains: [ { zh:"分析哲学", en:"Analytic philosophy" }, { zh:"形而上学", en:"Metaphysics" }, { zh:"伦理学", en:"Ethics" } ],
    cite: { zh:`Parfit, D. (1984). <span class="title">Reasons and Persons.</span> <span class="venue">Oxford: Oxford University Press.（第三部分）</span>`,
            en:`Parfit, D. (1984). <span class="title">Reasons and Persons.</span> <span class="venue">Oxford: Oxford University Press. (Part III.)</span>` },
    claim: { zh:`通过传送机、分裂等思想实验论证：人格同一性<b>「并不那么重要」</b>(identity is not what matters)。真正重要的是<b>心理连续性与关联性</b>(Relation R)，而非是否存在一个深层的、形而上学的同一自我。自我或许只是一束相续的心理状态，没有不变的内核。`,
             en:`Through thought experiments (teletransporter, division), argues that personal identity <b>"is not what matters."</b> What matters is <b>psychological continuity and connectedness</b> (Relation R), not whether some deep, metaphysically identical self persists. The self may be only a bundle of successive mental states, with no unchanging core.` },
    position: { zh:`从<b>第三方向</b>同时拆掉前两极：先别问自我是自由的还是被建构的，先问它<b>是否作为同一之物存在</b>。这条分析形而上学进路（上承休谟的束论、与佛教无我说惊人共鸣）若成立，则萨特的「筹划者」与福柯的「被造者」争夺的是个本不存在的东西。在你正典中它隐隐呼应地理学里 vague boundary／同一性边界的形式化关注。`,
               en:`Dismantles the first two poles from a <b>third direction</b>: before asking whether the self is free or constructed, ask whether it <b>exists as something identical</b> at all. This analytic-metaphysical route (descending from Hume's bundle theory, strikingly resonant with the Buddhist anatta) — if sound — means Sartre's "projector" and Foucault's "fabricated subject" are contending over something that does not exist. In this canon it quietly echoes the formalization of vague boundaries / the limits of identity in geography.` },
    dialogue: { zh:`对 <a href="#sartre-1943">萨特</a> 与 <a href="#foucault-1975">福柯</a> 双向釜底抽薪。与 <a href="#mcadams-2013">McAdams</a> 形成张力：帕菲特说同一性是幻觉，叙事身份研究却显示「构建连续自我故事」的能力与心理健康正相关——一个否认内核，一个研究内核的功用。两者可在「自我是有用的虚构」处相遇。`,
                en:`Cuts the ground from under both <a href="#sartre-1943">Sartre</a> and <a href="#foucault-1975">Foucault</a>. In tension with <a href="#mcadams-2013">McAdams</a>: Parfit calls identity an illusion, yet narrative-identity research shows that the capacity to construct a continuous self-story correlates with mental health — one denies the core, the other studies its function. They may meet at "the self as a useful fiction."` },
    note: { zh:`性质：分析哲学论证，依赖思想实验直觉而非实证数据。批评者质疑思想实验（如传送机）的直觉是否可靠，以及「Relation R 重要而同一性不重要」是否真能分离。`,
            en:`Kind: analytic-philosophical argument resting on thought-experiment intuitions, not empirical data. Critics question whether intuitions about cases like the teletransporter are reliable, and whether "Relation R matters but identity does not" can truly be prised apart.` }
  },
  {
    id: "mcadams-2013", theme: "self", pairWith: "parfit-1984",
    domains: [ { zh:"心理学", en:"Psychology" }, { zh:"发展心理学", en:"Developmental psychology" }, { zh:"人格科学", en:"Personality science" } ],
    cite: { zh:`McAdams, D. P., & McLean, K. C. (2013). <span class="title">Narrative Identity.</span> <span class="venue">Current Directions in Psychological Science, 22(3), 233–238.</span>`,
            en:`McAdams, D. P., & McLean, K. C. (2013). <span class="title">Narrative Identity.</span> <span class="venue">Current Directions in Psychological Science, 22(3), 233–238.</span>` },
    claim: { zh:`叙事身份是人<b>内化且不断演变的人生故事</b>，把重构的过去与想象的未来整合起来，赋予生命以统一与意义。实证发现：能在苦难中构建<b>救赎式</b>意义、并以能动与探索为主题叙事的人，心理健康与成熟度更高；且这一能力可追溯其发展轨迹、受文化脚本塑造。`,
             en:`Narrative identity is a person's <b>internalized, evolving life story</b>, integrating reconstructed past and imagined future to lend life unity and purpose. Empirically: those who construct <b>redemptive</b> meaning from adversity and narrate themes of agency and exploration tend to enjoy higher well-being and maturity; the capacity has a traceable developmental course and is shaped by cultural scripts.` },
    position: { zh:`本主题的<b>经验支点</b>，把纯思辨的自我之争拉回可测量的地面。它在哲学上呼应利科、麦金太尔的<b>叙事同一性</b>（自我本质上是被讲述的故事），但以人格与发展心理学的纵向研究、可操作构念为之提供数据支撑——正是你跨学科正典初衷的体现：不让一个主题沦为纯思辨。`,
               en:`The theme's <b>empirical anchor</b>, pulling the otherwise speculative dispute back to measurable ground. Philosophically it echoes Ricoeur's and MacIntyre's <b>narrative identity</b> (the self as essentially a told story), but underwrites it with longitudinal personality/developmental research and operational constructs — the very point of a cross-disciplinary canon: no theme left purely speculative.` },
    dialogue: { zh:`为三极提供<b>调和的第四声部</b>：自我或许既非全然自由(对萨特)、亦非全然被造(对福柯)、也不必有形而上内核(对帕菲特)——它是人<b>主动建构、却受文化脚本约束</b>的一个故事。这恰好把 <a href="#parfit-1984">帕菲特</a>「无内核」与对意义连续性的真实心理需要调和为：<b>自我是一个有用且健康的虚构</b>。`,
                en:`Offers a <b>reconciling fourth voice</b> to the three poles: the self may be neither wholly free (pace Sartre), nor wholly fabricated (pace Foucault), nor in need of a metaphysical core (pace Parfit) — it is a story a person <b>actively constructs, yet under the constraint of cultural scripts</b>. This reconciles <a href="#parfit-1984">Parfit</a>'s "no core" with the real psychological need for continuity of meaning: <b>the self as a useful and healthful fiction</b>.` },
    note: { zh:`局限：相关性证据为主，叙事特征与心理适应的<b>因果方向</b>仍待厘清（作者自陈）；研究偏重西方、尤其美国样本，「救赎叙事」可能带有文化特异性。`,
            en:`Limits: largely correlational; the <b>causal direction</b> between narrative features and adaptation remains to be disentangled (authors' own caveat); samples skew Western, especially American, and the "redemptive narrative" may be culturally specific.` }
  }
];
const state = { view: "theme", domain: "all", theme: "all", lang: "zh" };
const L = (obj) => (obj ? (obj[state.lang] || obj.zh || "") : "");
function allDomains() {
  const map = new Map();
  DATA.forEach(d => d.domains.forEach(x => map.set(x.zh, x)));
  return [...map.values()].sort((a,b) => L(a).localeCompare(L(b), state.lang === "en" ? "en" : "zh"));
}
function entryHTML(d) {
  const domTags = d.domains.map(x => `<span class="domain-tag">${L(x)}</span>`).join("");
  const TAGS = { position:{zh:"学科定位",en:"Placement"}, dialogue:{zh:"对话",en:"In dialogue"}, note:{zh:"局限 / 异议",en:"Limits / caveats"} };
  let b = `<p class="cite">${L(d.cite)}</p>`;
  b += `<p class="claim">${L(d.claim)}</p>`;
  if (d.position) b += `<p class="position"><span class="tag">${L(TAGS.position)}</span>${L(d.position)}</p>`;
  if (d.dialogue) b += `<p class="dialogue"><span class="tag">${L(TAGS.dialogue)}</span>${L(d.dialogue)}</p>`;
  if (d.note)     b += `<p class="note"><span class="tag">${L(TAGS.note)}</span>${L(d.note)}</p>`;
  return `<article class="entry" id="${d.id}"><div class="main">${b}</div>
    <aside class="meta"><div class="row">${domTags}</div></aside></article>`;
}
function render() {
  const root = document.getElementById("canon"); root.innerHTML = ""; let visible = 0;
  const pass = d => (state.domain === "all" || d.domains.some(x => x.zh === state.domain));
  if (state.view === "theme") {
    const filtering = state.theme !== "all";
    Object.keys(THEMES).forEach(key => {
      if (filtering && key !== state.theme) return;
      const items = DATA.filter(d => d.theme === key && pass(d)); if (!items.length) return;
      const t = THEMES[key];
      const active = state.theme === key;
      const titleAttr = active
        ? ` title="${state.lang==="en"?"Show all themes":"显示全部主题"}"`
        : ` title="${state.lang==="en"?"Filter to this theme":"只看这个主题"}"`;
      let html = `<section class="theme"><div class="theme-head"><div><h2 class="theme-title${active?" active":""}" data-theme="${key}"${titleAttr}>${L(t.title)}</h2></div><div class="theme-gloss">${L(t.gloss)}</div></div>`;
      items.forEach((d, i) => { html += entryHTML(d);
        const next = items[i+1];
        if (next && (next.pairWith === d.id || d.pairWith === next.id)) html += `<div class="tension-link">${state.lang==="en"?"these two argue with each other":"这两篇互相争论"}</div>`;
        visible++; });
      html += `</section>`; root.insertAdjacentHTML("beforeend", html);
    });
  } else {
    const doms = state.domain === "all" ? allDomains() : allDomains().filter(x => x.zh === state.domain);
    doms.forEach(dom => {
      const items = DATA.filter(d => d.domains.some(x => x.zh === dom.zh)); if (!items.length) return;
      const gloss = state.lang === "en" ? "One paper may appear under several domains — the whole point of a cross-disciplinary canon." : "同一篇论文可能出现在多个领域下——这正是跨学科正典的题中之义。";
      let html = `<section class="theme"><div class="theme-head"><div><span class="tnum">${state.lang==="en"?"Domain":"领域"}</span><h2>${L(dom)}</h2></div><div class="theme-gloss">${gloss}</div></div>`;
      items.forEach(d => { html += entryHTML(d); visible++; });
      html += `</section>`; root.insertAdjacentHTML("beforeend", html);
    });
  }
  document.getElementById("empty").style.display = visible ? "none" : "block";
}
function updateCensus() {
  document.getElementById("c-total").textContent = DATA.length;
  document.getElementById("c-themes").textContent = new Set(DATA.map(d => d.theme).filter(k => k !== "orphans")).size;
  document.getElementById("c-domains").textContent = allDomains().length;
}
function buildDomainChips() {
  const grp = document.getElementById("grp-domain");
  [...grp.querySelectorAll(".chip")].forEach(c => c.remove());
  const all = document.createElement("button"); all.className = "chip"; all.dataset.domain = "all";
  all.setAttribute("aria-pressed", state.domain === "all"); all.innerHTML = `<span data-zh>全部</span><span data-en>All</span>`; grp.appendChild(all);
  allDomains().forEach(dom => {
    const btn = document.createElement("button"); btn.className = "chip"; btn.dataset.domain = dom.zh;
    btn.setAttribute("aria-pressed", state.domain === dom.zh);
    btn.innerHTML = `<span data-zh>${dom.zh}</span><span data-en>${dom.en}</span>`; grp.appendChild(btn);
  });
}
function wire(groupId, key, after) {
  document.getElementById(groupId).addEventListener("click", e => {
    const btn = e.target.closest(".chip"); if (!btn || btn.dataset[key] === undefined) return;
    state[key] = btn.dataset[key];
    [...e.currentTarget.querySelectorAll(".chip")].forEach(c => c.setAttribute("aria-pressed", c === btn));
    if (after) after(); render();
  });
}
wire("grp-view", "view", () => { state.theme = "all"; }); wire("grp-domain", "domain");
document.getElementById("grp-lang").addEventListener("click", e => {
  const btn = e.target.closest(".chip"); if (!btn || !btn.dataset.lang) return;
  state.lang = btn.dataset.lang; document.documentElement.setAttribute("data-lang", state.lang);
  [...e.currentTarget.querySelectorAll(".chip")].forEach(c => c.setAttribute("aria-pressed", c === btn));
  buildDomainChips(); render();
});
// click a theme title to filter to it; click the active (filtered) title to show all
document.getElementById("canon").addEventListener("click", e => {
  const h = e.target.closest(".theme-title"); if (!h) return;
  state.theme = (state.theme === h.dataset.theme) ? "all" : h.dataset.theme;
  render();
  if (state.theme !== "all") document.querySelector(".theme-title.active")?.scrollIntoView({ behavior: "smooth", block: "start" });
});
document.documentElement.setAttribute("data-lang", "zh");
buildDomainChips(); updateCensus(); render();
</script>
</body>
</html>
