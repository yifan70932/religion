<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Football Tactic Board</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="site">
    <header class="hero">
      <div>
        <p class="kicker">Interactive coaching workspace</p>
        <h1>Football Tactic Board</h1>
      </div>
      <div class="hero-actions">
        <button id="exportBtn" class="button primary" type="button">Export PNG</button>
        <button id="resetBtn" class="button ghost" type="button">Reset</button>
      </div>
    </header>
    <section class="layout" aria-label="Football tactic board application">
      <section class="board-section" aria-label="Pitch board">
        <div id="captureArea" class="capture-area">
          <div class="board-meta">
            <div>
              <h2>Match Plan</h2>
              <p id="formationLabel">4-3-3</p>
            </div>
            <p id="notePreview">Add a coaching note below.</p>
          </div>
          <div id="pitch" class="pitch" role="application" aria-label="Interactive football pitch">
            <canvas id="drawingCanvas"></canvas>
            <div class="pitch-markings" aria-hidden="true">
              <div class="halfway"></div><div class="center-circle"></div><div class="center-spot"></div>
              <div class="penalty-box left"></div><div class="goal-box left"></div><div class="penalty-arc left"></div>
              <div class="penalty-box right"></div><div class="goal-box right"></div><div class="penalty-arc right"></div>
              <div class="goal left"></div><div class="goal right"></div>
            </div>
            <div id="playersLayer" class="players-layer"></div>
          </div>
        </div>
      </section>
      <aside class="controls" aria-label="Board controls">
        <section class="control-card">
          <h3>Setup</h3>
          <div class="field">
            <label for="formationSelect">Formation</label>
            <select id="formationSelect">
              <option value="433">4-3-3</option>
              <option value="442">4-4-2</option>
              <option value="4231">4-2-3-1</option>
              <option value="352">3-5-2</option>
              <option value="custom">Custom</option>
            </select>
          </div>
          <div class="two-col">
            <label class="checkline"><input id="toggleHome" type="checkbox" checked />Home</label>
            <label class="checkline"><input id="toggleAway" type="checkbox" checked />Away</label>
          </div>
        </section>
        <section class="control-card">
          <h3>Tools</h3>
          <div class="tool-grid" role="group" aria-label="Drawing tools">
            <button id="moveTool" class="tool active" type="button" data-tool="move">Move</button>
            <button id="arrowTool" class="tool" type="button" data-tool="arrow">Arrow</button>
            <button id="lineTool" class="tool" type="button" data-tool="line">Line</button>
          </div>
          <div class="two-col">
            <button id="clearDrawingsBtn" class="button secondary" type="button">Clear</button>
            <button id="flipBoardBtn" class="button secondary" type="button">Flip</button>
          </div>
        </section>
        <section class="control-card">
          <h3>Coach Note</h3>
          <div class="field">
            <label for="noteInput">Instruction</label>
            <textarea id="noteInput" rows="4" placeholder="Example: Press wide, recover centrally, release quickly after winning the ball."></textarea>
          </div>
          <p class="hint">Drag players to reposition. On touch screens, choose Arrow or Line, then drag on the pitch.</p>
        </section>
      </aside>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
